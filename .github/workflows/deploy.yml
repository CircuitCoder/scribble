name: Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed by build.ts for git dates

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Generate posts.typ
        run: bun run build

      - uses: typst-community/setup-typst@v4

      - name: Compile to HTML
        run: typst compile --features html -f html index.typ

      - name: Prepare deployment directory
        run: |
          HASH=${{ github.sha }}
          mkdir -p _site/"$HASH"

          # Root-level files
          cp index.html _site/
          cp *.css _site/ 2>/dev/null || true
          cp *.js _site/ 2>/dev/null || true
          if [ -d assets ]; then cp -r assets _site/assets; fi

          # Commit-hash snapshot (for permalinks)
          cp index.html _site/"$HASH"/
          cp *.css _site/"$HASH"/ 2>/dev/null || true
          cp *.js _site/"$HASH"/ 2>/dev/null || true
          if [ -d assets ]; then cp -r assets _site/"$HASH"/assets; fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true
          cname: scribble.meow.plus

      - name: Notify Telegram
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')

          # Find changed .typ files under src/ in this commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'src/*.typ' 2>/dev/null || true)

          LINKS=""
          for f in $CHANGED; do
            POST_ID=$(basename "$f" .typ)
            LINKS="${LINKS}• <a href=\"https://scribble.meow.plus/#post-${POST_ID}\">#${POST_ID}</a>"$'\n'
          done

          if [ -z "$LINKS" ]; then
            TEXT="${COMMIT_MSG}"
          else
            TEXT="${COMMIT_MSG}"$'\n'$'\n'"Changed posts:"$'\n'"${LINKS}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHANNEL_ID}" \
            -d parse_mode=HTML \
            --data-urlencode "text=${TEXT}"
